<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} ?: 'My Site'"></title>
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:if="${pageStyles}" th:href="@{${pageStyles}}">
    <script src="https://kit.fontawesome.com/0399362fc8.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="big-navbar">
        <div class="navbar">
            <a href="index.html" class="logo-in-navbar">
                <i class="fas fa-book fa-lg"></i>
                <span class="first-logo-text">CHARLES ULAND</span><span class="second-logo-text">TUTORING</span>
            </a>
            <div class="navbar-links">
                <ul class="ul-links">
                    <li><a href="">Classes</a></li>
                    <li><a href="">About Charlie</a></li>
                    <li><a href="">My Meetings</a></li>
                    <li><a href="">FAQs</a></li>
                </ul>
            </div>
            <div class="navbar-login">
                <a href="">Login</a>
            </div>
            <div class="hamburger-icon">
                <i class="fas fa-bars fa-lg " onclick="toggleviz()"></i>
            </div>
        </div>
        <div class="shrunk-links-and-login">
            <div class="shrunk-navbar-links">
                <ul>
                    <li><a href="">Classes</a></li>
                    <li><a href="">About Charlie</a></li>
                    <li><a href="">My Meetings</a></li>
                    <li><a href="">FAQs</a></li>
                </ul>
            </div>
            <div class="navbar-login shrunk">
                <a href="">Login</a>
            </div>
        </div>
        <script>
            function toggleviz() {
                document.querySelector(".shrunk-links-and-login").classList.toggle("show");
            }
        </script>

    </div>

<main class="main">
    <div th:replace="~{${view} :: content}"></div>
</main>

</body>
</html>
